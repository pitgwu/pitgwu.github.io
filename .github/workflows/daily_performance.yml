name: 每日台股漲停檔資料更新

on:
  schedule:
    # 說明:
    # 分鐘: 0
    # 小時: 7 (UTC 時間，對應台灣時間 15:00)
    # 日期: *
    # 月份: *
    # 星期: 1-5 (週一到週五)
    - cron: '0 7 * * 1-5'
    
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    # 設定環境變數 (從 Secrets 讀取)
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3' # 修正：升級到 3.12.3 以支援 yfinance
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install twstock yfinance pandas pytz lxml jinja2
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run script
        run: |
          python update_twstock_codes.py
          python record_limit_up.py
          python scan_monthly_history_remove_repeat.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 1. 強制加入 data, performance  資料夾下的所有變動 (包含子資料夾與新檔案)
          git add data/\*.csv
          git add performance/\performance_report*.html
          
          # 2. 檢查是否有東西可以 commit (避免因為沒資料更新而報錯)
          if git diff --cached --quiet; then
            echo "沒有偵測到任何 CSV 檔案變動，跳過提交。"
          else
            git commit -m "📈 自動更新數據庫: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
