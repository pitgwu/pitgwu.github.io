name: TW Stock Daily analytics Update & Report

on:
  schedule:
# 台灣時間 16:00 = UTC 08:00 (GitHub Actions 使用 UTC 時間)
    # 分 時 日 月 週
    - cron: '0 8 * * 0-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # 設定環境變數 (從 Secrets 讀取)
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      TZ: 'Asia/Taipei' # 設定時區 (雖主要影響 log 顯示)
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pandas yfinance requests sqlalchemy psycopg2-binary plotly tqdm lxml
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 1. Run Daily Pipeline (Basic)
        # 執行基礎資料更新 (清單 + 股價)
        run: python daily_pipeline_basic.py

      - name: 2. Run Daily Pipeline (analytics)
        # 更新法人籌碼 (每日收盤後執行)
        run: python daily_pipeline_analytics.py

      - name: 3. Generate Daily Report
        # 產生 HTML 報表
        run: |
          # 產生台股日報
          python generate_tw_daily_report_supabase.py
          # 產生強勢股報表
          python select_strong_stocks.py
        
      - name: 4. Deploy Report to GitHub Pages
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 1. 強制加入 data, performance  資料夾下的所有變動 (包含子資料夾與新檔案)
          git add tw_stock_dashboard/\*
          
          # 2. 檢查是否有東西可以 commit (避免因為沒資料更新而報錯)
          if git diff --cached --quiet; then
            echo "沒有偵測到任何 CSV 檔案變動，跳過提交。"
          else
            git commit -m "📈 自動更新數據庫: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
