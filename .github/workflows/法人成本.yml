name: 每日法人成本更新

on:
  schedule:
    # 說明:
    # 分鐘: 0
    # 小時: 12 (UTC 時間，對應台灣時間 20:00)
    # 日期: *
    # 月份: *
    # 星期: * (週一到週日)
    - cron: '0 12 * * *'
    
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.3' # 修正：升級到 3.12.3 以支援 yfinance
          cache: 'pip'

      - name: 3. Install dependencies
        run: |
          pip install pandas numpy openpyxl google-api-python-client google-auth
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 4. 執行爬蟲與報表生成
        env:
          # 將 GitHub Secrets 中的金鑰傳入環境變數
          GDRIVE_SERVICE_ACCOUNT: ${{ secrets.GDRIVE_SERVICE_ACCOUNT }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python 法人成本.py

      - name: 5. 提交並推送產生的 HTML 檔案
        run: |
          # 設定機器人的 Git 身份
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 將新產生的檔案加入追蹤 (如果 snowbaby 資料夾是新建立的也會一併加入)
          git add snowbaby/法人成本.html
          
          # 檢查是否有檔案變動，如果有才 commit 和 push，避免因檔案無變動而報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Auto-update: 法人成本報表" && git push)
